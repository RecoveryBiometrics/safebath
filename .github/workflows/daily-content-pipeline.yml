name: Daily Content Pipeline

on:
  schedule:
    # Every day at 6am ET (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI anytime

permissions:
  contents: write

jobs:
  content-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workspace repo
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout website repo into site/
        uses: actions/checkout@v4
        with:
          repository: RecoveryBiometrics/safebath-website
          ref: main
          path: site
          token: ${{ secrets.WEBSITE_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts/content-pipeline

      - name: Run content pipeline
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node index.js
        working-directory: scripts/content-pipeline

      - name: Commit pipeline state to workspace repo
        run: |
          git config user.name "SafeBath Content Pipeline"
          git config user.email "content-pipeline@safebathgrabbar.com"
          git add seo-data/pipeline-state.json
          git diff --staged --quiet || git commit -m "Content pipeline: $(date +%Y-%m-%d) — update pipeline state"
          git push origin main

      - name: Commit new articles to website repo
        working-directory: site
        run: |
          git config user.name "SafeBath Content Pipeline"
          git config user.email "content-pipeline@safebathgrabbar.com"
          git add src/data/local-news/
          git diff --staged --quiet || git commit -m "Content pipeline: $(date +%Y-%m-%d) — new local news articles"
          git push origin main
